id: project-must-have-gdrive-folder
name: Project must have Drive folder
description: |
  Every project must declare its Drive folder so Atlas can route humans and
  automations to the authoritative project location.
scope: vocab:rule_scopes:project
severity: vocab:rule_severities:error
applies_to: project where id is_not_null
must_satisfy: project where gdrive_folder is_not_null
enforcement_point: vocab:enforcement_points:all
on_violation: |
  Block writes and generation outputs for the project until gdrive_folder is
  set; log an error in validation output.
authored_by: operator
created_at: 2026-05-08T03:42:25Z
updated_at: 2026-05-08T03:42:25Z
