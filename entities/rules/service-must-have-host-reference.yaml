id: service-must-have-host-reference
name: Service must have host reference
description: |
  Every service must reference a host so deployment responsibility and runtime
  triage can resolve to a concrete server.
scope: vocab:rule_scopes:service
severity: vocab:rule_severities:error
applies_to: service_entity
check_kind: vocab:rule_check_kinds:manual
check_definition: |
  Verify that each service references a host entity.
fix_tier: vocab:rule_fix_tiers:flag
fix_action: null
enforcement_point: vocab:enforcement_points:all
on_violation: |
  Block writes and generation outputs for the service until host is set; log an
  error in validation output.
authored_by: operator
