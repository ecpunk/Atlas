id: project-must-have-concept-doc
name: Project must have concept doc
description: |
  Every project must declare a concept document path so planning and execution
  can anchor to a canonical specification.
scope: vocab:rule_scopes:project
severity: vocab:rule_severities:error
applies_to: project_entity
check_kind: vocab:rule_check_kinds:field_present
check_definition: concept_doc
fix_tier: vocab:rule_fix_tiers:flag
fix_action: null
enforcement_point: vocab:enforcement_points:all
on_violation: |
  Block writes and generation outputs for the project until concept_doc is set;
  log an error in validation output.
authored_by: operator
created_at: 2026-05-08T03:42:25Z
updated_at: 2026-05-09T01:22:14Z
