id: project-must-have-status
name: Project must have lifecycle status
description: |
  Every project must declare a lifecycle status to support prioritization,
  sequencing, and status-oriented views.
scope: vocab:rule_scopes:project
severity: vocab:rule_severities:error
applies_to: project_entity
check_kind: vocab:rule_check_kinds:field_present
check_definition: status
fix_tier: vocab:rule_fix_tiers:flag
fix_action: null
enforcement_point: vocab:enforcement_points:all
on_violation: |
  Block writes and generation outputs for the project until status is set; log
  an error in validation output.
authored_by: operator
