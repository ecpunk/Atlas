id: service-mcp-network-binding-present
name: MCP service must declare network binding
description: |
  Every mcp_http service must declare its network binding so topology is
  explicit and agents can determine reachability without external docs.
scope: vocab:rule_scopes:service
severity: vocab:rule_severities:error
applies_to: service_entity:mcp_http
check_kind: vocab:rule_check_kinds:field_present
check_definition: network_binding
fix_tier: vocab:rule_fix_tiers:flag
fix_action: null
enforcement_point: vocab:enforcement_points:all
on_violation: |
  Add network_binding to the service entity. Valid values: localhost, lan,
  tailscale, public. Surface as error in Entity Compliance Report until resolved.
authored_by: operator
created_at: 2026-05-09T00:00:00Z
updated_at: 2026-05-09T00:00:00Z
