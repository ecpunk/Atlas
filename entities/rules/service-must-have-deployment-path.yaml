id: service-must-have-deployment-path
name: Service must have deployment path
description: |
  Every service must declare a deployment path so runtime ownership, operations,
  and incident handling can resolve to a concrete location.
scope: vocab:rule_scopes:service
severity: vocab:rule_severities:error
applies_to: service_entity
check_kind: vocab:rule_check_kinds:manual
check_definition: |
  Verify that each service declares a deployment path.
fix_tier: vocab:rule_fix_tiers:flag
fix_action: null
enforcement_point: vocab:enforcement_points:all
on_violation: |
  Block writes and generation outputs for the service until deployment_path is
  set; log an error in validation output.
authored_by: operator
