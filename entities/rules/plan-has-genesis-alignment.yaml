id: plan-has-genesis-alignment
name: Plan declares Genesis alignment
description: |
  Plan documents must state their Genesis alignment to keep plan intent tied to
  Atlas architectural principles.
scope: vocab:rule_scopes:instruction_layer
severity: vocab:rule_severities:warn
applies_to: plan_document
check_kind: vocab:rule_check_kinds:section_present
check_definition: |
  Plan must contain a section named exactly "Why this plan exists (Genesis
  alignment)" or "Genesis Alignment Check"
fix_tier: vocab:rule_fix_tiers:flag
fix_action: null
min_plan_number: 19
enforcement_point: vocab:enforcement_points:generation
on_violation: |
  Flag the plan for operator review in the compliance report; do not auto-remediate.
