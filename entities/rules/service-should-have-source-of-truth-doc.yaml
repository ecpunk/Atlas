id: service-should-have-source-of-truth-doc
name: Service should have source-of-truth doc
description: |
  Services should declare a source-of-truth document path so operators can
  resolve inventory, topology, and failure context quickly.
scope: vocab:rule_scopes:service
severity: vocab:rule_severities:warn
applies_to: service where id is_not_null
must_satisfy: service where source_of_truth_doc is_not_null
enforcement_point: vocab:enforcement_points:scheduled_audit
on_violation: |
  Emit a warning during audits and generation; do not block writes, but surface
  remediation guidance in validation output.
authored_by: operator
created_at: 2026-05-08T03:42:25Z
updated_at: 2026-05-08T03:42:25Z
