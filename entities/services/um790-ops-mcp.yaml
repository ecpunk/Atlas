id: um790-ops-mcp
name: UM790 Ops MCP
summary: |
  MCP service providing local operations tooling: shell execution, docker
  lifecycle management, service health, and logs. Exposes shell_exec,
  docker_action, docker_status, service_logs, and server_status tools.
  Intended as the permanent home for ops tools migrated out of knowledge-server
  as part of the pre-Atlas compensation retirement track.
service_type: vocab:service_types:mcp_http
lifecycle: vocab:service_lifecycles:running
host: server:um790
deployment_path: /opt/stack/services/projects/um790-ops-mcp/
port: 8103
health_endpoint: http://192.168.1.150:8103/mcp
systemd_unit: um790-ops-mcp.service
network_binding: lan
auth:
  mechanism: api_key
  header: X-API-Key
  env_var: UM790_OPS_API_KEY
  key_file: /opt/stack/services/projects/um790-ops-mcp/.secrets/api_key.txt
  notes: Localhost bypasses auth check. Remote clients must supply the header.
owned_by: project:um790-ops-mcp
depends_on: []
last_health_check: null
last_health_status: vocab:health_statuses:unknown
failure_modes:
  - shell_exec timeout if UM790_OPS_TOOL_TIMEOUT_SECONDS is too low for the command
  - docker_action on non-existent container returns non-zero exit but does not raise
resource_budget_ram_mb: null
created_at: 2026-05-09T14:30:00Z
updated_at: 2026-05-09T00:00:00Z
