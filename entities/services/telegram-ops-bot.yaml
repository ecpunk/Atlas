id: telegram-ops-bot
name: Telegram Ops Bot
summary: Single-user Telegram operator surface for UM790 runtime with confirm-gated
  writes and JSONL/YAML audit/session artifacts. Polling-based bot with stateless
  token confirmation fallback for restart-safe confirmations.
service_type: vocab:service_types:systemd_unit
lifecycle: vocab:service_lifecycles:running
host: server:um790
deployment_path: /opt/stack/services/apps/telegram-ops-bot
owned_by: project:telegram-ops-bot
created_at: '2026-05-12T01:54:55Z'
updated_at: '2026-05-12T02:25:22Z'
systemd_unit: telegram-ops-bot.service
restartable: true
tier: app
expected_state: running
protected_high_use: false
failure_modes:
  - Bot process down or polling loop stalled; recover with systemctl restart telegram-ops-bot.service.
  - UM790 Ops MCP unreachable or timeout; read/write commands fail until backend connectivity is restored.
  - Confirmation token expired before user confirms; user must re-issue command to generate a new token.
resource_budget_ram_mb: 256
