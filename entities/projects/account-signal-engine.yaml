last_done: 2026-05-12 — Concept doc written. Originated from a call with Hoyt McCuin
  about Google Alerts noise. Three-layer architecture decided, mirroring Atlas pattern.
  Four-stage cascade locked (deterministic source/heuristic filtering → batched LLM
  triage → digest synthesis), with SEC 8-K bypassing LLM triage since Item codes already
  classify. v1 source list set, signal taxonomy locked (mna, exec_change, breach;
  hiring_delta deferred). POV scope narrowed to one account / one source (EDGAR) /
  one signal type / one recipient. Project entity registered.
