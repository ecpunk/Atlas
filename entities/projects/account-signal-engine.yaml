id: account-signal-engine
name: Account Signal Engine
summary: Weekly digest engine that monitors a named account list and delivers only
  actionable signals (M&A, exec changes, breaches, hiring). Originated from a 2026-05-12
  call with Hoyt McCuin about Google Alerts noise. Two-recipient MVP (Jon + Hoyt).
  Built as engine because the shape is identical across SE users — only the account
  list changes. Inherits Atlas's canonical-store / generation-pipeline / operational-layer
  pattern via proposed intel/ sub-namespace. Four-stage cascade keeps LLM cost low
  and provenance auditable.
