id: code-intelligence-mcp
name: Code Intelligence MCP
summary: |
  Local MCP server delivering deterministic structural facts about live code
  state to any agent. Complement to Copilot/Cursor embedding retrieval - exact
  answers to structural queries (symbol graph, cross-repo search, git
  archaeology). Pairs with Dev Framework Extension for focus-aware context
  injection. Hard boundary with Cognitive Substrate - peers, not layers.
