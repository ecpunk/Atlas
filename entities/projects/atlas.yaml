id: atlas
name: Atlas
summary: |
  Canonical definition store + generation pipeline + operational layer that
  aggregates signals across the stack. Replaces hand-maintained five-file
  operating system (Start Here, Latest, Project Index, Standards, History) with
  views generated from a single source of truth. Owns lifecycle, schedule,
  drift detection, and AI agent routing. Greek titan metaphor - holds the
  structure that lets the stack scale without crushing the operator.
