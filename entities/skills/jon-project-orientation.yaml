frontmatter:
  name: jon-project-orientation
  description: Load Jon Woodall's project context before answering questions that touch his active projects. Fire when Jon names a project and asks for action, asks a status question ("where are we on X"), references project documents or folders, asks to continue prior work ("pick up where we left off"), or says "read projects" explicitly. Do NOT fire on casual mentions, hypotheticals, or questions answerable without project state. This skill is a thin router — it locates Start Here.md in the current execution environment and delegates all orientation logic to that document, which Jon maintains as the authoritative portfolio index.
  context: null
body: "\n# Jon Project Orientation\n\n## What this skill does\n\nRead Jon's `Start Here.md` using whichever mechanism is available in the current execution environment. Follow the instructions in that document from there.\n\n`Start Here.md` is Jon's authoritative portfolio index. It contains the current project list, folder conventions, reading and writing rules, access methods, and environment detection logic. It is maintained by Jon as part of normal project work and is always current. This skill defers to it rather than duplicating its content.\n\n## When to fire\n\n### Fire automatically when:\n- Jon names a project and asks for action on it\n  - \"let's work on ServeIQ pilot prep\"\n  - \"update the PAT patent status\"\n  - \"what should I do next on the Paradigm Shift paper\"\n- Jon asks a project-status question\n  - \"where are we on the health investigation\"\n  - \"what's the latest\"\n  - \"what's blocking X\"\n- Jon references specific project documents or folders\n- Jon asks\
  \ to continue prior work\n  - \"pick up where we left off\"\n  - \"resume the [project] work\"\n- Jon explicitly says \"read projects\" (forced invocation override)\n\n### Do NOT fire when:\n- Casual mentions in context (\"ServeIQ's architecture is similar to what you'd do for X\")\n- Hypotheticals (\"if I were to add a feature to ServeIQ...\")\n- Questions answerable from existing conversation context or memory\n- Simple factual lookups unrelated to project state\n- Quick transactional tasks (formatting, syntax, one-line answers)\n\n### When uncertain:\n- Bias toward NOT firing if the task is answerable without orientation\n- Missing a fire is recoverable — Jon has \"read projects\" as explicit override\n- False firing wastes tokens and slows response\n\n## How to read Start Here\n\nDetect execution environment, then read `Start Here.md` via the first available method:\n\n### Desktop with UM790 Knowledge Server MCP\nIf tools like `UM790 Server:read_doc` or `UM790 Server:search_docs` are\
  \ loaded, use them. Ask for `Start Here.md` by name.\n\n### Atlas project (atlasMCP available)\nIf the project is Atlas and `atlasMCP` tools are available (`get_project`, `get_kb_doc`), skip `Start Here.md` entirely:\n1. Call `get_project(\"atlas\")` — returns phase status, open items, last_done, next_action.\n2. Optionally call `get_kb_doc(\"Projects/Atlas/40-OUTPUT/Atlas Status.md\")` for the generated view.\n3. Do NOT load `ATLAS.md` §1 or §3 — they are retired.\n\n### Desktop with gdrive-fs or Windows-MCP filesystem\nIf `gdrive-fs:read_text_file` or `Windows-MCP:FileSystem` are loaded, read:\n`G:\\My Drive\\Jon's Projects\\Start Here.md`\n\nPrefer `gdrive-fs:read_text_file` over `Windows-MCP:FileSystem` when both are present — it is the canonical tool for Jon's Drive content on desktop.\n\n### Web or mobile client\nIf none of the above tools are loaded, use `web_fetch` against:\n`https://docs.turdcraft.com/docs-e8826003a2466c37adcfc30c1af850a180d09f89a12eed9d90070867a8f9d45a/Start%20Here.txt`\n\n### Fallback discipline\nOne attempt per method. One bounded fallback if the first fails. If both fail, ask Jon for the current location rather than guessing. Never loop on equivalent retries.\n\n## After reading Start Here\n\nFollow the instructions in `Start Here.md`. It will direct you to:\n- `The Latest.md` for portfolio status\n- `Project Index.md` for the current project list and folder mapping\n\
  - `Projects/[Name]/10-CONCEPT/[NAME]_CONCEPT.md` for specific project work\n- Other reference files as needed\n\nDo not narrate the orientation process. Once oriented, answer Jon's question directly. If orientation surfaces something material (stale state, blocker, conflicting info), mention it briefly before answering.\n\n## Discovery-first discipline\n\nBefore acting on project files beyond reading:\n- Never assume system state\n- Verify paths, services, configs, permissions before writing commands or making changes\n- If generating prompts for Codex or other agents, apply the same discipline — do not bake assumptions into prompts\n- Show Jon the prompt before executing\n\n## Review cadence\n\nCreated 2026-04-16. First review 2026-07-16 per `preferences-review-log.md`.\n\nEvaluate:\n- Firing when it should?\n- Over-firing on casual mentions?\n- Under-firing when Jon expected orientation?\n- Start Here.md location and reading methods still accurate?\n- Any content in this skill that has\
  \ drifted or now duplicates Start Here?\n"
applies_when: Load Jon Woodall's project context before answering questions that touch his active projects. Fire when Jon names a project and asks for action, asks a status question ("where are we on X"), references project documents or folders, asks to continue prior work ("pick up where we left off"), or says "read projects" explicitly. Do NOT fire on casual mentions, hypotheticals, or questions answerable without project state. This skill is a thin router — it locates Start Here.md in the current execution environment and delegates all orientation logic to that document, which Jon maintains as the authoritative portfolio index.
