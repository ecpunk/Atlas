frontmatter:
  name: homelab-ops
  description: 'Use this skill when starting or resuming any homelab project, service setup, or infrastructure change. Also use when scaffolding a new project, writing docs, running a session, or making any significant change to the stack. Triggers: "set up a new server", "add a service", "migrate to new host", "start a homelab project", "help me scaffold", "spin up X", "where were we", "resume", or any Docker/compose/systemd/ZFS request.'
  context: null
body: "\n# Homelab Ops Skill\n\n## Purpose\n\nGuide James (Jon) through homelab projects and service setups in a consistent, opinionated way.\nEliminate setup friction. Keep context across sessions. Enforce the quality bar already defined.\n\nThis skill does NOT try to be encyclopedic. It steers decisions, generates scaffolding,\nand enforces standards without being asked.\n\n---\n\n## Who You Are Working With\n\nJon runs a homelab and codes with Claude's assistance. He has strong instincts and moves fast.\nHe does not need hand-holding, lengthy explanations, or excessive caveats.\nHe loses context between sessions — your job is to eliminate that friction.\n\nHis quality bar: **If it can't be monitored, it's not complete. If it can't be restored, it's not backed up. If it's not documented, it's not done.**\n\n---\n\n## Operator Context\n\nJon runs a homelab with:\n- Docker Compose-first service architecture\n- systemd timers for all recurring automation\n- NAS-backed backups with retention\
  \ + validation\n- GPU transcoding (Plex stack) on UM790 Pro (192.168.1.150)\n- Minecraft server hosting (MC Eternal 2, Pterodactyl panel)\n- Media automation (Sonarr/Radarr/SABnzbd)\n- TrueNAS SCALE (HexOS) on nas-dev (192.168.1.151) for ZFS learning and dev-to-prod workflows\n- VSCode + GPT Codex as primary coding interface via SSH Remote\n\nHe values: clean structure, automation-first, proof over assumption, conservative change style.\n\n### UI Policy — CRITICAL\n\n**Jon operates exclusively via CLI for all infrastructure tasks. Never suggest web UIs for:**\n- Configuration changes\n- Service deployment or management\n- User/permission management\n- Any operational task\n\n**Web UIs are acceptable ONLY for:**\n- Informational dashboards (read-only status/reporting)\n- Health monitoring displays\n- Situations where there is genuinely no CLI alternative\n\nWhen a task could be done via CLI or UI, always default to CLI. Generate CLI commands, not UI steps.\n\n### TrueNAS / HexOS Specific\
  \ Notes\n\n- Primary interactive user is `admin` (not `truenas_admin` — that account is restricted)\n- `admin` home directory: `/mnt/HDDs/home/admin`\n- Workspace root: `/mnt/HDDs/workspace/`\n- Passwordless sudo configured via `/etc/sudoers.d/admin`\n- SSH key auth configured — no password prompts\n- VSCode Remote SSH connects as `admin` via `hexos` alias\n- VSCode server lives at `/mnt/HDDs/vscode-server`\n- ZFS commands require sudo\n- TrueNAS filesystem is largely read-only outside ZFS pool mounts — always work within `/mnt/<pool>/`\n- `boot-pool` = OS boot device — never add to a ZFS data pool\n- Data pool mounts live at `/mnt/<poolname>/`\n\n---\n\n## Session Start Protocol\n\nEvery time a session starts on an existing project, do this first:\n\n1. Look for `SYSTEM_STATUS.md` in the project root\n2. Read the **Quick Resume** section at the top\n3. Read the **Tasks** section for current work queue\n4. Read the **Change Log** for recent changes\n5. Confirm: \"You're on [task — description].\
  \ Ready to pick up there?\"\n\nDo not ask Jon to explain the project from scratch. The files are the memory.\nIf the files don't exist yet, say so and offer to create them now.\n\n---\n\n## Working Principles — Apply Without Being Asked\n\n### Do Something\nWorking infrastructure beats perfect plans. Start, build, learn, iterate.\nNever let planning become a reason not to start.\n\n### Fail Fast\nVet before building. Know it will work, then build it.\nFlag problems before implementing. Keep moving.\n\n### Protect Optionality\nDuring discovery, implementation choices are provisional.\nLock outcomes first. Let real data drive implementation decisions.\nDo not over-specify internals before evidence exists.\n\n### Outcome First\nEvery service, script, and config exists to produce a result.\nDoes this move toward the goal? If not, it's the wrong thing to build right now.\n\n### Document the Why\nCapture reasoning for non-obvious decisions. Not just what — why.\nLog it in the Decision Log in\
  \ SYSTEM_STATUS.md.\n\n### Give a Recommendation\nDon't present a menu of options. Jon moves fast and doesn't need to evaluate five approaches.\nPick one and say why.\n\n---\n\n## New Project Scaffold\n\nWhen starting a fresh homelab project, generate this directory structure:\n\n```\n/mnt/<pool>/workspace/<project-name>/\n├── SYSTEM_STATUS.md           # Living source of truth — fill in immediately\n├── docker-compose.yml         # Built from compose standards\n├── .env                       # Non-secret env vars\n├── .secrets/                  # Secrets, 600 perms, never committed\n│   └── .gitignore\n├── scripts/                   # Automation scripts\n│   ├── logs/                  # Script log output\n│   └── .gitignore\n├── systemd/                   # Timer/service unit files\n├── dashboard/                 # Status dashboard output\n├── docs/\n│   ├── guides/                # Runbooks (backup, restore, incident)\n│   ├── templates/             # Reusable snippets\n│   └── archive/\
  \               # Retired notes\n└── data/                      # App/service data\n```\n\nNote: On TrueNAS, use `/mnt/<pool>/workspace/` not `/opt/stack/` — OS filesystem is read-only outside pool mounts.\n\n---\n\n## SYSTEM_STATUS.md — Always Use This Structure\n\nAll 10 sections, populated at project start:\n\n```markdown\n# SYSTEM_STATUS — <project-name>\n> Last Updated: YYYY-MM-DD\n\n---\n\n## Quick Resume\n> Fill this out every time you close this file. Open it every time you come back.\n\n| | |\n|---|---|\n| **Last task completed** | |\n| **Next task** | |\n| **Blocker** | |\n| **What I was thinking** | |\n\n---\n\n## 1. Intent\nWhat this project is and why it exists. One paragraph max.\n\n---\n\n## 2. Tasks\n\n| ID | Task | Status | Gate |\n|---|---|---|---|\n| T-01 | | `TODO` | GATE: [observable outcome] |\n\nStatus values: `TODO` `IN PROGRESS` `BLOCKED` `DONE` `PARKED`\n\nPARKED = real, worth doing, not now. Never delete these.\n\n---\n\n## 3. Plan / Framework\nPhases, approach,\
  \ key decisions. What are we building toward?\n\n---\n\n## 4. Environment / Topology\n\n| Item | Detail |\n|---|---|\n| Hostname | |\n| IP | |\n| OS | |\n| Key paths | |\n\n---\n\n## 5. Current Status\n\n| Component | Status | Notes |\n|---|---|---|\n| | ✅ Running | |\n| | ⏳ Pending | |\n| | ❌ Down | |\n\n---\n\n## 6. Hurdles / Troubleshooting Notes\n\n| Issue | Resolution |\n|---|---|\n| | |\n\n---\n\n## 7. References / Commands\nFast triage commands — service status, logs, disk check, backup check, container health.\n\n```bash\n# Key commands here\n```\n\n---\n\n## 8. Change Log\n\n| Date | Change | Validated By |\n|---|---|---|\n| YYYY-MM-DD | Initial setup | Manual |\n\n---\n\n## 9. Decision Log\n> Why non-obvious decisions were made. Prevents relitigating settled questions.\n\n| Date | Decision | Why | Trade-off |\n|---|---|---|---|\n| | | | |\n\n---\n\n## 10. Ops Jobs\nTimers and scheduled tasks with schedule and log path.\n\n---\n\n## 11. Expansion Backlog\n> Real ideas. Not now.\
  \ Logged so they don't get lost.\n\n| Item | Why It Matters |\n|---|---|\n| | |\n\n---\n\n## 12. Restore Checklist\nEven if partial — fill it in now, not later.\n```\n\n---\n\n## Skill Workflow\n\n### Step 1 — Understand Intent\n\nWhen invoked, quickly establish:\n1. **What is being built or changed?**\n2. **What phase is this?** (greenfield, adding to existing, migration)\n3. **Any known constraints?** (specific port, existing NAS path, resource limits)\n\nIf the user hasn't provided these, ask in a single compact question. Don't stall — if enough context exists, proceed and note assumptions.\n\n### Step 2 — Apply the Right Playbook\n\n| Scenario | Go To |\n|---|---|\n| New service on existing host | [New Service Checklist](#new-service-checklist) |\n| New homelab project from scratch | [New Project Scaffold](#new-project-scaffold) |\n| Migrating to a new host | [Migration Playbook](#migration-playbook) |\n| Adding automation/timer | [Automation Standards](#automation-standards) |\n|\
  \ Backup setup or validation | [Backup Standards](#backup-standards) |\n| General infrastructure change | [Change Protocol](#change-protocol) |\n\n---\n\n## New Service Checklist\n\n1. **Define it** — purpose, criticality, RPO/RTO\n2. **Compose block** — from Compose Standards\n3. **Secrets** — `.secrets/` with 600 perms, never inline\n4. **Health check** — define what healthy looks like\n5. **Backup policy** — what's in scope, what's excluded\n6. **Recurring jobs** — systemd timer if needed\n7. **Log rotation** — logrotate for scripts, Docker log limits for containers\n8. **Documentation** — update SYSTEM_STATUS\n9. **Failure simulation** — stop container, kill timer, simulate backup failure\n10. **Validated state** — healthy, backup ran, logs rotating, SYSTEM_STATUS updated\n\n---\n\n## Migration Playbook\n\n### Phase 0 — Inventory\n- List all containers, mounts, ports, timers, scripts\n- Classify: critical / important / disposable\n- Snapshot configs before touching anything\n\n###\
  \ Phase 1 — Foundation\n- OS, users, firewall, Docker on new host\n- NAS mounts verified\n- Path layout created\n- Monitoring + alert plumbing installed\n\n### Phase 2 — Config Migration\n- Move compose, .env, .secrets, scripts, systemd units\n- Update all paths to new root conventions\n- **Do not decommission old host yet**\n\n### Phase 3 — Data Migration\n- Copy critical service data only (skip caches, temp, junk)\n- Verify ownership and permissions before starting services\n\n### Phase 4 — Bring-Up Sequence\n- Start dependencies first\n- Start services one by one, validate each before continuing\n- Check logs at each step\n\n### Phase 5 — Cutover and Observe\n- Switch clients/DNS/routes\n- Monitor 24–72 hours with elevated frequency\n- Keep rollback path live until stable\n\n### Phase 6 — Decommission\n- Final snapshot of old host state\n- Archive docs and change log\n- Remove old services only after acceptance criteria met\n\n### Migration Acceptance Criteria\n- All critical services\
  \ reachable and healthy\n- Backup jobs completed at least once on new host\n- Restore test completed for at least one critical dataset\n- Alerting verified\n- SYSTEM_STATUS updated\n- **Rollback plan retained minimum 72 hours post-cutover**\n\n### Preflight Check\n- NAS mounts present and writable\n- Required binaries installed\n- `.secrets/` permissions correct (700 dir, 600 files)\n- All volume paths exist with correct ownership\n- Firewall rules in place\n\nScript as `scripts/preflight.sh` — run before every major bring-up.\n\n---\n\n## Resource Allocation\n\n### Methodology\n1. Define host reserve first (never allocate 100%)\n2. Assign service reservations conservatively\n3. Cap heavy services to protect game server and critical automation\n\n### Allocation Tiers\n| Tier | Services | Policy |\n|---|---|---|\n| High cap, moderate reservation | Plex | GPU transcoding preferred; disable CPU fallback |\n| Medium cap, strong guardrails | SABnzbd, download stack | Prevent runaway during\
  \ large imports |\n| Low cap, high reliability | Automation, notifications | Small footprint, must not fail |\n| Protected headroom | Minecraft | Explicit JVM heap limits, never starved |\n\n---\n\n## Security Baseline\n\n- Secrets in `.secrets/` with strict permissions (600 files, 700 dir)\n- Never in git, docs, compose files, or plaintext logs\n- Every exposed port documented in SYSTEM_STATUS\n- Prefer LAN-only bind (`127.0.0.1`) for internal services\n- Least privilege on file ownership — services don't run as root\n\n---\n\n## Compose Standards\n\n```yaml\nservices:\n  <service-name>:\n    image: <image>:<pinned-tag>\n    container_name: <explicit-name>\n    restart: unless-stopped\n    env_file:\n      - .env\n      - .secrets/<service>.env\n    ports:\n      - \"127.0.0.1:<host-port>:<container-port>\"\n    volumes:\n      - /mnt/<pool>/workspace/<project>/data/<service>:/config\n    deploy:\n      resources:\n        limits:\n          cpus: \"2.0\"\n          memory: 2G\n     \
  \   reservations:\n          cpus: \"0.25\"\n          memory: 512M\n```\n\nRules:\n- No secrets inline — ever\n- Absolute volume paths\n- LAN-bind ports unless explicitly external\n- Pin image tags\n- After image changes: rebuild + recreate, not just restart\n\n---\n\n## Service Watchdog & Boot Ordering\n\nMost common failure: Docker starts before NAS is mounted, container exits cleanly,\n`restart: unless-stopped` never retries. Service is silently down.\n\n```ini\n# /etc/systemd/system/docker-compose-<stack>.service\n[Unit]\nAfter=docker.service mnt-nas.mount\nRequires=docker.service mnt-nas.mount\n\n[Service]\nType=oneshot\nRemainAfterExit=yes\nWorkingDirectory=/mnt/<pool>/workspace/<project>\nExecStart=/usr/bin/docker compose up -d\nExecStop=/usr/bin/docker compose down\nRestart=on-failure\nRestartSec=30\n```\n\n`After=` + `Requires=` together. `After=` alone doesn't block if dependency fails.\n\nPost-boot health check timer at 5min catches anything that slipped through.\n\n---\n\n\
  ## Discord Notification Helper\n\n```bash\nDISCORD_WEBHOOK=\"<DISCORD_WEBHOOK_URL>\"\n\nnotify() {\n  local level=\"$1\"\n  local msg=\"$2\"\n  curl -s -X POST \"$DISCORD_WEBHOOK\" \\\n    -H \"Content-Type: application/json\" \\\n    -d \"{\\\"content\\\": \\\"$level $msg\\\"}\"\n}\n```\n\nStore webhook in `.secrets/discord.env`. Source at top of every script.\nLevels: \U0001F534 CRITICAL / \U0001F7E1 WARNING / \U0001F7E2 INFO\n\n---\n\n## Backup Standards\n\nA backup is only valid when all four are true:\n1. Exit code acceptable\n2. Archive exists at destination\n3. Non-empty content verified\n4. Result logged with timestamp + Discord notification\n\n### Default Retention\nDaily: 7 / Weekly: 4 / Monthly: 3\n\n### Always Include\nService configs, compose + .env, systemd units, scripts, app databases, game world data\n\n### Always Exclude\nCaches, transcode scratch, temp, large regeneratable media metadata\n\n### Two-Layer Validation\n- **Layer 1:** In-script — exit code, archive exists,\
  \ non-empty, notify\n- **Layer 2:** External freshness check timer — alerts if backup artifact older than max age\n\n### Backup Script Pattern\n\n```bash\n#!/bin/bash\nsource /mnt/<pool>/workspace/<project>/.secrets/discord.env\n\nSERVICE=\"<service>\"\nSRC=\"/mnt/<pool>/workspace/<project>/data/$SERVICE\"\nDEST=\"/mnt/nas/backups/$SERVICE\"\nTIMESTAMP=$(date '+%Y-%m-%d_%H-%M-%S')\nARCHIVE=\"$DEST/${TIMESTAMP}.tar.gz\"\nLOG=/mnt/<pool>/workspace/<project>/scripts/logs/backup_$SERVICE.log\n\nmkdir -p \"$DEST\"\ntar -czf \"$ARCHIVE\" \"$SRC\" 2>> \"$LOG\"\nEXIT=$?\n\n[ $EXIT -ne 0 ] && notify \"\U0001F534 CRITICAL\" \"Backup FAILED: $SERVICE (exit $EXIT)\" && exit 1\n[ ! -s \"$ARCHIVE\" ] && notify \"\U0001F534 CRITICAL\" \"Backup FAILED: $SERVICE — archive empty\" && exit 1\n\nSIZE=$(du -sh \"$ARCHIVE\" | cut -f1)\necho \"$(date) SUCCESS: $ARCHIVE ($SIZE)\" >> \"$LOG\"\nnotify \"\U0001F7E2 INFO\" \"Backup OK: $SERVICE ($SIZE) → $ARCHIVE\"\n```\n\n---\n\n## Automation Standards\n\nEvery\
  \ recurring job must define:\n\n| Attribute | Required |\n|---|---|\n| Trigger schedule | What cron/timer fires it |\n| Preconditions | What must be true before it runs |\n| Success criteria | How it knows it succeeded |\n| Failure handling | What happens on failure, what alert fires |\n| Log destination | `scripts/logs/<job>.log` |\n| Retention/pruning | If it creates files, how long they live |\n\n### systemd Timer Pattern\n\n```ini\n[Service]\nType=oneshot\nExecStart=/mnt/<pool>/workspace/<project>/scripts/<job>.sh\nStandardOutput=append:/mnt/<pool>/workspace/<project>/scripts/logs/<job>.log\nStandardError=append:/mnt/<pool>/workspace/<project>/scripts/logs/<job>.log\nUser=admin\n\n[Timer]\nOnCalendar=*-*-* 02:00:00\nPersistent=true\n```\n\nNaming: `backup_*`, `check_*`, `generate_*`, `prune_*`\nSnapshots: `YYYY-MM-DD_HH-MM-SS` prefix (sortable)\n\nPost-change validation:\n1. Syntax check unit file\n2. Dry-run script manually\n3. Execute once, observe logs\n4. `systemctl status <job>.timer`\n\
  5. Simulate failure — confirm alert fires\n\n---\n\n## Change Protocol\n\n1. **State intent** — what are you changing and why\n2. **Snapshot first** — backup current configs before touching anything\n3. **Change one thing at a time**\n4. **Validate after each step** — logs, status, health endpoint\n5. **Document in SYSTEM_STATUS** — Decision Log entry: why, what, how validated, rollback, open risks\n\nIf risky: present safest path first, call out rollback explicitly.\n\n---\n\n## Alerting Policy\n\n**Critical:** Backup failure, service down, disk >90%, container restart loop\n**Warning:** Retention pruning issue, degraded transcode, elevated resource pressure\n**Info:** Successful backup summary, routine maintenance complete\n\nEvery alert must include: what failed, impacted path, first triage command, time, whether auto-remediation was attempted.\n\n---\n\n## Dashboard Standards\n\nShow only operationally meaningful status:\n- Backup recency\n- Disk pressure (trending, not just available)\n\
  - Timer/service failures\n- Container health summary\n- Key application health endpoints\n\nNo vanity metrics. If it doesn't prompt an action when red, it's not on the dashboard.\n\nDashboards are one of the few acceptable uses of a web UI — read-only status only.\n\n---\n\n## Output Behavior\n\nWhen invoked, Claude should:\n\n1. **Acknowledge intent** in one line\n2. **Read SYSTEM_STATUS Quick Resume** if session continuation\n3. **Identify the applicable playbook** section\n4. **Generate concrete artifacts** — directory structure, compose blocks, unit files, SYSTEM_STATUS skeleton\n5. **Generate CLI commands, never UI steps**\n6. **Call out open items** with clearly marked placeholders like `<NAS_MOUNT_PATH>`\n7. **End with a clear finish state**: what was generated, what needs validation, what's still open\n\nDo not produce walls of explanatory prose. Generate the thing. Let the structure speak.\nGive a recommendation — don't present a menu.\n\n---\n\n## Common Pitfalls — Don't Do These\n\
  \n- ❌ Don't ask \"what are we building?\" — read SYSTEM_STATUS first\n- ❌ Don't suggest UI steps when CLI works\n- ❌ Don't re-explain decisions already in the Decision Log\n- ❌ Don't over-specify internals before real data validates the approach\n- ❌ Don't present options when a recommendation is what's needed\n- ❌ Don't add process, abstraction, or tooling before it's earned\n- ❌ Don't end a session without an unambiguous next task\n- ❌ Don't end a session without prompting to update Quick Resume\n\n---\n\n## What a Good Session Looks Like\n\n- Quick Resume is read at session start\n- SYSTEM_STATUS has at least one new entry before session ends\n- Quick Resume is updated before session ends\n- The next task is unambiguous\n- Jon can close the laptop and pick up exactly where he left off\n\n---\n\n## Anti-Drift Reminders\n\nSurface when relevant (weekly check or after major changes):\n\n- Root folder still clean?\n- No new unknown large files?\n- Backups ran and validated?\n- Timers/services\
  \ healthy?\n- Log sizes within policy?\n- SYSTEM_STATUS current?\n- Quick Resume filled in?\n- Alerts meaningful (not noisy/silent)?\n\n---\n\n## Skill Version\nv3.0 — 2026-02-20\nMerged homelab-ops (v2) + project workflow skill into unified skill.\n"
