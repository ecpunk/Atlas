    name: Desktop App
    description: Agent runs in a native desktop application.
    semantics: |
      Session state and controls live in an installed desktop client.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: vscode_extension
    name: VS Code Extension
    description: Agent is exposed through a Visual Studio Code extension surface.
    semantics: |
      Operates in the editor workflow and can act on the open workspace.
