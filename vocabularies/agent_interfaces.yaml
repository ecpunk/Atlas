    deprecated: false
    deprecated_reason: null
  - id: cli
    name: CLI
    description: Agent is accessed from a command-line interface.
    semantics: |
      Tooling is terminal-driven and optimized for scriptable invocation.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: web
    name: Web
    description: Agent is accessed through a browser-based web interface.
    semantics: |
      Execution and state are mediated through a hosted web application.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: mobile
    name: Mobile
    description: Agent is accessed from a phone or tablet app.
