id: agent_interfaces
name: Agent Interfaces
description: |
  Interaction surfaces through which an agent is accessed and operated.
purpose: |
  Distinguishes runtime and interaction boundaries so capabilities, constraints,
  and operational expectations can be interpreted correctly.
values:
