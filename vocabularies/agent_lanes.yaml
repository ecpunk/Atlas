id: agent_lanes
name: Agent Lanes
description: |
  Operational lanes that define an agent's primary and secondary usage modes.
purpose: |
  Encodes lane doctrine so orchestration can choose the right agent behavior for
  planning, execution, investigation, composition, or review work.
values:
