    name: Planning
    description: Build plans, structure decisions, and sequence work.
    semantics: |
      Use when synthesizing direction, dependencies, and execution order.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: implementation
    name: Implementation
    description: Execute known changes directly in code, config, and automation.
    semantics: |
      Prefer for deterministic build and change tasks against clear specs.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: discovery
    name: Discovery
    description: Investigate current state before acting.
    semantics: |
      Prefer read-first diagnosis and verification of real system conditions.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: specialty
    name: Specialty
    description: Handle narrow domain workflows requiring specific expertise.
    semantics: |
      Use for constrained tasks that need domain-tuned prompts and logic.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: composition
    name: Composition
    description: Integrate outputs across tools, docs, and subsystems.
