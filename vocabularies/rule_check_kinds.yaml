id: rule_check_kinds
name: Rule Check Kinds
description: |
  Canonical check implementation kinds for rule evaluation. These values define
  how the rule engine evaluates a rule against a target artifact.
purpose: |
  Keeps rule evaluation semantics normalized so generators and validators can
  apply rules consistently without ad hoc branching by rule ID.
values:
  - id: section_present
    name: Section Present
    description: Rule passes when the required markdown section heading exists.
    semantics: |
      Heading matching is exact unless a specific rule definition explicitly
      allows alternatives.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: frontmatter_field_present
    name: Frontmatter Field Present
    description: Rule passes when all required frontmatter keys are present.
    semantics: |
      Rules using this check kind declare the required key set in
      check_definition.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: length_warning
    name: Length Warning
    description: Rule warns when content length exceeds a configured threshold.
    semantics: |
      Thresholds are declared in check_definition and interpreted by the
      consuming generator.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: template_reference_present
    name: Template Reference Present
    description: Rule passes when a required template/path reference appears.
    semantics: |
      check_definition declares the required reference and matching behavior.
    physical_location: null
    deprecated: false
    deprecated_reason: null
  - id: manual
    name: Manual
    description: Rule requires human judgment and is not machine-evaluated.
    semantics: |
      Automated generators report manual checks as requires-human-judgment.
    physical_location: null
    deprecated: false
    deprecated_reason: null
extension_policy: open
